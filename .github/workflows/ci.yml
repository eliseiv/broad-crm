# CI/CD (07-deployment.md#cicd). Движок: GitHub Actions.
# Pipeline: lint → test → deploy (по SSH rsync на /opt/crm, сборка стека на сервере).
#
# Триггеры:
#   - pull_request        → только lint + test (без деплоя);
#   - push в main         → lint + test + deploy.
#
# Секреты (GitHub → Settings → Secrets and variables → Actions), всего ТРИ:
#   - SSH_USER        — пользователь SSH на прод-сервере;
#   - SSH_HOST        — адрес прод-сервера;
#   - SSH_DEPLOY_KEY  — приватный ed25519-ключ (публичный уже в authorized_keys на сервере).
# Прод-секреты приложения живут в /opt/crm/.env на сервере (вне git и вне CI) и
# НЕ перезаписываются при деплое (rsync --exclude='.env').

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff + mypy)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Install uv (с кэшем зависимостей)
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.11"
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy (strict)
        run: uv run mypy app

  test:
    name: Test (pytest, gate >= 80%)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: crm
          POSTGRES_PASSWORD: crm
          POSTGRES_DB: crm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U crm -d crm_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      APP_ENV: development
      DATABASE_URL: postgresql+asyncpg://crm:crm@localhost:5432/crm_test
    steps:
      - uses: actions/checkout@v4

      - name: Install uv (с кэшем зависимостей)
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.11"
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      # Эфемерные секреты для тестов — не хардкодим значения в YAML.
      - name: Generate ephemeral secrets (JWT_SECRET, FERNET_KEY)
        run: |
          echo "JWT_SECRET=$(uv run python -c 'import secrets; print(secrets.token_urlsafe(48))')" >> "$GITHUB_ENV"
          echo "FERNET_KEY=$(uv run python -c 'from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())')" >> "$GITHUB_ENV"

      - name: Pytest (coverage gate >= 80%)
        run: uv run pytest --cov=app --cov-report=term-missing --cov-fail-under=80

  deploy:
    name: Deploy (SSH rsync → /opt/crm)
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH deploy key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_DEPLOY_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Rsync working tree to server (/opt/crm)
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='node_modules' \
            --exclude='.venv' \
            --exclude='frontend/dist' \
            --exclude='backups' \
            --exclude='.idea' \
            --exclude='.cursor' \
            --exclude='__pycache__' \
            ./ "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/crm/"

      - name: Compose up on server (build + start)
        run: |
          ssh "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            'cd /opt/crm && docker compose --env-file .env -f infra/docker-compose.yml up -d --build && docker compose --env-file .env -f infra/docker-compose.yml ps'
