# CRM — мониторинг серверов, Этап 1 (07-deployment.md).
# Запуск из корня репозитория (где лежит .env):
#   docker compose --env-file .env -f infra/docker-compose.yml up -d
# --env-file нужен для интерполяции ${POSTGRES_*}/${GF_*}/${PUBLIC_HOSTNAME}.
#
# Наружу публикуется ТОЛЬКО proxy (:80/:443). postgres, backend, prometheus, grafana
# доступны лишь внутри сети crm-net (NFR-9, 05-security.md).

name: crm

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - crm-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$POSTGRES_USER\" -d \"$POSTGRES_DB\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    # IMAGE_TAG — ОПЦИОНАЛЬНЫЙ override тега образа (по умолчанию `current`).
    # CI (GitHub Actions) его НЕ задаёт: собирает crm-backend:current на сервере
    # через `up -d --build` (07-deployment.md#cicd). Переменная нужна лишь для
    # ручного отката на ранее собранный тег (legacy infra/scripts/*).
    image: crm-backend:${IMAGE_TAG:-current}
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    # Backend читает почти все переменные — отдаём весь .env (config.py extra=ignore).
    env_file:
      - ../.env
    volumes:
      # file_sd: backend пишет targets/<id>.json (rw), Prometheus читает (ro).
      - file_sd:/etc/prometheus/targets
      # documents-attachments: байты изображений документов (ADR-068 §8).
      # Монтируется ТОЛЬКО сюда — второго читателя нет (в отличие от file_sd),
      # отсюда права 0700/0600, заданные в backend/Dockerfile. Точка монтирования
      # создана в образе с chown app:app: пустой named-volume пришёл бы root:root,
      # и backend под USER app не создал бы даже шард-каталог <aa>/<bb>.
      # ⚠️ БЭКАП: этот volume — ВТОРОЙ объект состояния наряду с pgdata и обязан
      # сниматься СОГЛАСОВАННО с ним (infra/scripts/backup.sh; backup-db.sh — только
      # устаревший шим); из БД не восстановим — в ней метаданные и checksum, байтов нет.
      # ⚠️ Владелец файлов на volume — ЧИСЛОВОЙ uid 999 (`app`, запинен в
      # backend/Dockerfile). Права 0700/0600 ⇒ сдвиг uid при пересборке образа сделал бы
      # уже лежащие вложения нечитаемыми. uid — часть формата бэкапа, не менять.
      - documents-attachments:/var/lib/crm/documents/attachments
      # private_data_dir ansible-runner (ADR-067 §5, 07-deployment.md §tmpfs):
      # на время прогона плейбука здесь материализуется РАСШИФРОВАННЫЙ приватный
      # SSH-ключ файлом 0600. tmpfs ⇒ он живёт только в памяти: не попадает на
      # диск, в слои образа, в volume'ы и бэкапы, исчезает вместе с контейнером.
      - type: tmpfs
        target: /var/run/crm/ansible
        tmpfs:
          size: 67108864   # 64 МБ: inventory/env/артефакты одного прогона (единицы МБ)
                           # + ключ (≤ SSH_KEY_MAX_BYTES = 16 КБ). Загрузки файлов сюда
                           # НЕ попадают — multipart спулится в обычный /tmp.
          # ⛔⛔ НОРМАТИВНАЯ ФОРМА — ровно `0o1777`, не «примерно 1777».
          # Поле tmpfs.mode числовое (uint32), проверено на docker 29.6.1 / compose v5.1.4:
          #   mode: "01777" → decoding failed … expected type 'uint32', got unconvertible
          #                   type 'string' ⇒ падает и `config`, и `up`: НЕ поднимается
          #                   ВЕСЬ стек, а не только провижининг;
          #   mode: 1777    → разбирается ДЕСЯТИЧНО ⇒ режим 0o3361 (d-wxrwS--t): без sticky
          #                   и без w у others ⇒ mkdtemp под app падает с PermissionError,
          #                   т.е. ЛЮБОЕ добавление сервера (включая парольное) ломается;
          #   mode: 0o1777  → 1777 drwxrwxrwt ✅.
          # Docker монтирует tmpfs под root:root, а опции uid=/gid= в compose не
          # выражаются — потому нужен именно world-writable+sticky, как у системного /tmp.
          # Сам ключ защищён правами ВЛОЖЕННОГО mkdtemp-каталога (0700, владелец app)
          # и файла (0600); sticky-бит не даёт чужому пользователю их удалить.
          mode: 0o1777
      # ⛔ tmpfs на /tmp НЕ монтировать (прежнее предписание отменено, ADR-067 §5):
      # Starlette/python-multipart спуливают туда UploadFile > ~1 МБ, а изображения
      # документов допускаются до DOCUMENTS_MAX_IMAGE_BYTES = 5 МБ ⇒ несколько
      # параллельных загрузок + артефакты ansible-runner на одном 64-МБ разделе дали бы
      # No space left on device. Каталоги разведены намеренно.
    networks:
      - crm-net
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3).status==200 else 1)
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s

  prometheus:
    image: prom/prometheus:v2.54.1
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      # Запас параллелизма PromQL (default 20) против 503 при всплеске опросов —
      # доп. защита к backend cache+single-flight+семафор+ретраи (P0 устойчивости).
      - "--query.max-concurrency=50"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - file_sd:/etc/prometheus/targets:ro
      - prom-data:/prometheus
    networks:
      - crm-net
    depends_on:
      # backend стартует первым и инициализирует владельца named-volume file_sd.
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  grafana:
    image: grafana/grafana:11.2.2
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      # Root URL для sub-path /grafana (07-deployment.md#конфигурация-grafana).
      # Выводится из PUBLIC_HOSTNAME (отдельной переменной base-url больше нет —
      # drill-down из UI убран, ADR-005 поправка). Grafana остаётся datasource-only.
      GF_SERVER_ROOT_URL: https://${PUBLIC_HOSTNAME:-crm.local}/grafana
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - crm-net
    depends_on:
      prometheus:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  proxy:
    # frontend-артефакт (SPA) встроен в proxy-образ. IMAGE_TAG — опциональный
    # override (default `current`); CI его не задаёт, см. backend выше.
    image: crm-proxy:${IMAGE_TAG:-current}
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        # ПУСТО по умолчанию: buildUrl сам добавляет '/api' (same-origin за nginx),
        # иначе двойной префикс /api/api/... (reviewer critical).
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
        VITE_POLL_INTERVAL_MS: ${VITE_POLL_INTERVAL_MS:-15000}
    restart: unless-stopped
    environment:
      # CN/SAN self-signed серта и каталог сертификатов (05-security.md#tls-сертификаты).
      # Реальные fullchain.pem+privkey.pem в volume proxy-certs имеют приоритет над автогеном.
      PUBLIC_HOSTNAME: ${PUBLIC_HOSTNAME:-crm.local}
      TLS_CERT_DIR: ${TLS_CERT_DIR:-/etc/nginx/certs}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - proxy-certs:/etc/nginx/certs
    networks:
      - crm-net
    depends_on:
      backend:
        condition: service_started
      grafana:
        condition: service_started

networks:
  crm-net:
    driver: bridge

volumes:
  # Бэкапу подлежат ДВА объекта состояния и только согласованно (ADR-068, 07-deployment.md
  # §Бэкапы): pgdata и documents-attachments. Одна БД без файлов = документы с битыми
  # картинками; файлы без БД = никем не адресуемый мусор.
  pgdata:
  prom-data:
  grafana-data:
  file_sd:
  documents-attachments:
  proxy-certs:
