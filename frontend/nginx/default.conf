# Reverse-proxy + раздача SPA (07-deployment.md#reverse-proxy-nginx-требования).
# Единственный публикуемый наружу сервис. TLS терминируется здесь.
#
# Security-заголовки (05-security.md#http-заголовки-безопасности):
#   - для /api их ставит backend-middleware (setdefault) → на nginx НЕ дублируем;
#   - для SPA (HTML/статика из location /) backend в отдаче НЕ участвует, поэтому
#     те же заголовки выставляет nginx — ТОЛЬКО в location / (не на server-уровне),
#     чтобы они НЕ протекали в /api/ и /grafana/ и не давали двойных заголовков.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# HTTP :80 — только healthcheck и редирект на HTTPS.
server {
    listen 80;
    server_name _;

    # Точка для docker healthcheck (busybox wget по http, без TLS).
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS :443 — SPA + проксирование /api и /grafana.
server {
    listen 443 ssl;
    http2 on;
    server_name _;

    # Путь фиксирован = TLS_CERT_DIR (volume proxy-certs). fullchain.pem+privkey.pem:
    # реальные серты имеют приоритет, иначе self-signed автоген (05-security.md#tls-сертификаты).
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root  /usr/share/nginx/html;
    index index.html;

    # SPA: все неизвестные пути отдаём index.html (client-side routing).
    location / {
        # Security-заголовки для основного browser-entrypoint (HTML/статика).
        # Набор и значения совпадают с backend _SECURITY_HEADERS (05-security.md).
        # `always` — отдаются и на не-2xx ответах. Только здесь, не на /api/.
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options    "nosniff" always;
        add_header X-Frame-Options           "DENY" always;
        add_header Referrer-Policy           "no-referrer" always;
        # Значение CSP — НОРМАТИВНОЕ (05-security.md#csp), обязано совпадать ПОБАЙТОВО
        # здесь и в дубле ниже (location /assets/). 'unsafe-inline' для style —
        # Tailwind/Radix инлайн-стили. img-src включает blob: — картинка документа
        # грузится авторизованным fetch и подставляется как blob:-URL (ADR-068 §3:
        # <img src="/api/…"> ушёл бы БЕЗ Authorization, а анонимная раздача означала бы
        # утечку в обход per-node видимости). blob: — пассивный same-origin источник из
        # уже полученных под JWT данных; script-src 'self' не затрагивает.
        add_header Content-Security-Policy    "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
        # index.html и прочие НЕхешированные корневые ассеты (в т.ч. /theme-init.js —
        # вынесенный no-FOUC-скрипт темы, ADR-046 §4.1) — только ревалидация.
        # До фикса тут не было ни Cache-Control, ни expires → браузер кэшировал HTML
        # эвристически и после выката продолжал исполнять старый документ
        # (инфраструктурный усилитель бага тёмной темы, ADR-046 §4.4).
        add_header Cache-Control              "no-cache" always;

        try_files $uri $uri/ /index.html;
    }

    # Хешированные ассеты сборки: Vite кладёт content-hash в имя файла → содержимое
    # по конкретному URL неизменно ⇒ вечный кэш (ADR-046 §4.4).
    #
    # ⚠️ nginx-ловушка (07-deployment.md#reverse-proxy-nginx--требования): add_header во
    # ВЛОЖЕННОМ location ОТМЕНЯЕТ ВСЕ унаследованные add_header родительского location /
    # (наследование не аддитивное, а замещающее на уровне блока). Поэтому все 4
    # security-заголовка и CSP ПРОДУБЛИРОВАНЫ здесь ПОБАЙТОВО (значение CSP —
    # нормативное, 05-security.md#content-security-policy-spa-location-).
    # Не удалять дубли: их пропуск молча снимет CSP/HSTS/X-Frame-Options со статики.
    location /assets/ {
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options    "nosniff" always;
        add_header X-Frame-Options           "DENY" always;
        add_header Referrer-Policy           "no-referrer" always;
        add_header Content-Security-Policy    "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
        # ⚠️ БЕЗ `always` — намеренно (асимметрия с заголовками выше зафиксирована
        # нормативно, 07-deployment.md §Reverse-proxy). С `always` immutable-кэш ушёл бы
        # и на не-2xx: при битом/неполном выкате клиент закэшировал бы САМ 404 на год,
        # причём immutable подавляет ревалидацию даже по reload. Повторная сборка кладёт
        # файл под тем же content-hash → пострадавший клиент продолжает читать
        # закэшированный 404, и откат его НЕ чинит. Кэш обязан покрывать только успешную
        # отдачу существующего ассета. Security-заголовки и CSP — наоборот, остаются
        # `always` (обязаны покрывать и не-2xx). Не «унифицировать».
        add_header Cache-Control              "public, max-age=31536000, immutable";

        # Явно фиксируем контракт: несуществующий хешированный ассет → 404, НЕ index.html.
        # (SPA-fallback из соседнего location / сюда и так не наследуется — директива
        # закрепляет поведение, а не закрывает реальную дыру.)
        try_files $uri =404;
    }

    # API: проброс реального IP клиента обязателен для rate-limit входа
    # (05-security.md#аутентификация-администратора). HSTS не добавляем — ставит backend.
    # Публичные SMS-webhook'и (POST /api/sms/webhooks/twilio/sms, POST /api/sms/telegram/webhook,
    # ADR-030) обслуживаются этим же location /api — отдельных блоков не требуется; JWT-exempt
    # на уровне backend, гейт — подпись Twilio / секрет Telegram. Источник URL для подписи
    # Twilio — SMS_PUBLIC_BASE_URL (backend), X-Forwarded-* для подписи не используются.
    location /api/ {
        # Батч-приём почты POST /api/mail/ingest (ADR-044 §3, до
        # MAIL_INGEST_MAX_BATCH=100 писем, каждое с body_text+body_html).
        # Дефолт nginx (1m) режет крупные батчи проксёй ДО backend → 413.
        # 50m: реальный худший батч ~5.8 МБ (замер по корпусу 2874 писем) с
        # ~8.6× запасом на рост. Ставим ТОЛЬКО на /api/ (за JWT/HMAC, публичной
        # загрузки файлов нет), не на server-уровень — SPA/healthz/grafana лимит
        # не наследуют. См. комментарий 6-7 о by-location локализации директив.
        client_max_body_size 50m;
        # Долгие (но ЗАКОННЫЕ) mail-server-пути: агрегатор идёт на удалённый IMAP/SMTP
        # (ADR-053 §6, 07-deployment.md §Reverse-proxy). Дефолт nginx — 60 с, что МЕНЬШЕ
        # бюджета backend → прокси срезал бы запрос раньше backend и отдал бы 504 HTML
        # вместо JSON-ошибки CRM с настоящей причиной (прод-баг: ложный 502 на добавлении
        # ящика). Инвариант — по бюджету ЗАПРОСА, а не одного вызова (ADR-053 §1.2.1):
        #   Σ overall-deadline всех вызовов + внепробная работа CRM (≤5 с) < 120
        #   худший путь (create + компенсирующее удаление сироты): 85 + 15 + 5 = 105 < 120
        # 120 продублировано константой-зеркалом NGINX_PROXY_READ_TIMEOUT_SEC в
        # backend/app/config.py (кросс-полевой model_validator) — менять ОБА вместе.
        # Ставим ТОЛЬКО на /api/ — SPA/healthz/grafana долгих ответов не отдают.
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_pass http://backend:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
    }

    # Grafana под sub-path /grafana (GF_SERVER_SERVE_FROM_SUB_PATH=true).
    location /grafana/ {
        proxy_pass http://grafana:3000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
    }
}
