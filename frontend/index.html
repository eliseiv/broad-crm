<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <meta name="theme-color" content="#F2F4F7" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <title>CRM</title>
    <!--
      No-FOUC: синхронно (до бандла) ставим data-theme на <html> по правилу
      «сохранённый выбор → иначе СВЕТЛАЯ» (08-design-system.md «Темизация», ADR-041;
      разворот прежнего системного дефолта ADR-033). Первая отрисовка (включая экран
      логина) — уже в правильной теме, без вспышки; prefers-color-scheme не участвует.

      Скрипт — ОТДЕЛЬНЫЙ СТАТИЧЕСКИЙ ФАЙЛ своего origin (`/theme-init.js`,
      frontend/public/), а НЕ inline (ADR-046 §4.1): прод-CSP несёт `script-src 'self'`
      без 'unsafe-inline'/nonce/hash → inline-скрипт не исполнялся бы, и тема всегда
      уходила бы в тёмную. CSP не ослабляется — меняется только способ подключения.
    -->
    <script src="/theme-init.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
